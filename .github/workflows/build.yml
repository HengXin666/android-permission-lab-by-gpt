name: Build

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web permission lab build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Type-check and build web app
        run: npm run build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          if-no-files-found: error

  xxpermissions-smoke:
    name: Open-source Android permission demo smoke build
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Clone XXPermissions
        run: git clone --depth=1 https://github.com/getActivity/XXPermissions.git upstream/XXPermissions

      - name: Build XXPermissions demo APK
        working-directory: upstream/XXPermissions
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload XXPermissions demo APK
        uses: actions/upload-artifact@v4
        with:
          name: xxpermissions-demo-apk
          path: upstream/XXPermissions/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
